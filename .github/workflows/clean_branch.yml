name: Clean Odoo Rep to enlight process and hd

on:
  workflow_dispatch:
  push:
    branches:
      - "18.0"

jobs:
  clean:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3
        with:
          ref: "18.0"
          fetch-depth: 0

      - name: Switch to clean branch (from 18.0)
        run: git checkout -B 18.0-cleaned 18.0

      - name: Run cleanup script (inline)
        run: |
          #!/bin/bash
          set -e
          echo "🔹 Nettoyage du repo pour base_framework"

          KEEP_MODULES=("base" "web" "web_tour" "web_editor" "web_hierarchy" "html_editor" "http_routing" "mail" "bus" "base_setup" "l10n_be" "website")

          # ➕ Compléter la liste KEEP_MODULES à partir des fichiers keep_modules_*.txt
          for f in .github/workflows/KEEP_MODULES_*.txt; do
            [ -f "$f" ] || continue
            echo "📂 Lecture du fichier $f"
            while IFS= read -r line || [ -n "$line" ]; do
              # ignorer lignes vides et commentaires
              [[ -z "$line" || "$line" =~ ^# ]] && continue
              KEEP_MODULES+=("$line")
            done < "$f"
          done

          for d in addons/*; do
            [ -d "$d" ] || continue
            mod="$(basename "$d")"
            keep=false
            for k in "${KEEP_MODULES[@]}"; do
              if [ "$mod" = "$k" ]; then keep=true; break; fi
            done
            if [ "$keep" = false ]; then
              echo "🗑️  Suppression module: $mod"
              rm -rf "$d"
            else
              echo "✅ On garde: $mod"
            fi
          done

          find addons -type f -path "*/i18n/*.po" \
            ! -name "en*.po" \
            ! -name "fr*.po" \
            ! -name "nl*.po" \
            -delete

          single_files_to_delete=(
            ".github/PULL_REQUEST_TEMPLATE.md"
            ".github/ISSUE_TEMPLATE/1_bug_form.yml"
            ".github/ISSUE_TEMPLATE/config.yml"
          )

          for f in "${single_files_to_delete[@]}"; do
            if [ -f "$f" ]; then
              echo "🗑️  Suppression fichier: $f"
              rm -f "$f"
            else
              echo "ℹ️  Fichier absent (ok): $f"
            fi
          done

          # 🔍 Suppression des fichiers liés aux modules et nettoyage des manifests

          module_files_to_delete=(
            "odoo/addons/base/data/ir_module_module.xml"
          )


          find_manifest() {
            local path="$1"
            while [ "$path" != "/" ]; do
              if [ -f "$path/__manifest__.py" ]; then
                echo "$path/__manifest__.py"
                return 0
              fi
              path=$(dirname "$path")
            done
            return 1
          }
                     
          for f in "${module_files_to_delete[@]}"; do
            if [ -f "$f" ]; then
              echo "🗑️  Suppression fichier de module: $f"
          
              manifest=$(find_manifest "$(dirname "$f")")
              if [ -n "$manifest" ]; then
                relative_path=$(basename "$(dirname "$f")")/$(basename "$f")
                echo "📝 Nettoyage du manifest: $manifest (suppression de $relative_path)"
          
                echo "🔎 Ligne(s) contenant $relative_path avant suppression:"
                grep -n "$relative_path" "$manifest" || echo "   (aucune ligne trouvée)"
          
                sed -i "\|$relative_path|d" "$manifest"
          
                echo "✅ Vérification après suppression:"
                grep -n "$relative_path" "$manifest" || echo "   (aucune occurrence restante)"
              else
                echo "⚠️  Aucun manifest trouvé pour $f"
              fi
          
              rm -f "$f"
            else
              echo "ℹ️  Fichier absent (ok): $f"
            fi
          done

          find . -type f -name "*.bat" -delete
          find . -type d -iname "*win32*" -exec rm -rf {} +

          echo "✅ Nettoyage terminé"

      - name: 🚑 Patch Odoo with fake iap module
        run: |
            # detect the correct addons dir (supports: addons, odoo/addons, odoo/odoo/addons)
            BASE_ADDONS_DIR="$(
              if [ -d addons ]; then
                echo "addons"
              elif [ -d odoo/addons ]; then
                echo "odoo/addons"
              else
                echo "odoo/odoo/addons"
              fi
            )"
            IAP_DIR="${BASE_ADDONS_DIR}/iap"
            mkdir -p "$IAP_DIR/tools"
  
            # Manifest minimal
            cat > "$IAP_DIR/__manifest__.py" << 'EOF'
            {
                'name': 'iap (fake)',
                'version': '1.0',
                'summary': 'Fake IAP module to bypass dependencies',
                'category': 'Hidden',
                'author': 'Custom Patch',
                'depends': ['base'],
                'installable': True,
                'application': False,
            }
            EOF
  
            # Init vide
            echo "" > "$IAP_DIR/__init__.py"
  
            # Tools factices (module import path: odoo.addons.iap.tools.iap_tools)
            cat > "$IAP_DIR/tools/iap_tools.py" << 'EOF'
            def iap_jsonrpc(endpoint, params=None, timeout=30):
                # Fake response for patched environment
                return {"status": "success", "content": "Fake IAP response"}
            EOF
            
                      # make tools a package (optional but safe)
                      echo "from . import iap_tools" > "$IAP_DIR/tools/__init__.py"
            
                      echo "✅ Fake iap module created at $IAP_DIR"

      - name: Commit cleaned version
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add -A
          git commit -m "🔄 Build cleaned framework from 18.0" || echo "No changes to commit"
          git push origin 18.0-cleaned --force

      - name: List remaining addons
        run: ls -d addons/* || true
