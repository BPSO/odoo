name: Clean Odoo Rep to enlight process and hd

on:
  workflow_dispatch:
  push:
    branches:
      - "18.0"

jobs:
  clean:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3
        with:
          ref: "18.0"
          fetch-depth: 1

      - name: Switch to clean branch (from 18.0)
        run: git checkout -B 18.0-cleaned 18.0

      - name: Run cleanup script (inline)
        run: |
          #!/bin/bash
          set -e
          echo "🔹 Nettoyage du repo pour base_framework"

          KEEP_MODULES=("base" "web" "web_tour" "html_editor" "mail" "bus" "base_setup" "l10n_be")

          for d in addons/*; do
            [ -d "$d" ] || continue
            mod="$(basename "$d")"
            keep=false
            for k in "${KEEP_MODULES[@]}"; do
              if [ "$mod" = "$k" ]; then keep=true; break; fi
            done
            if [ "$keep" = false ]; then
              echo "🗑️  Suppression module: $mod"
              rm -rf "$d"
            else
              echo "✅ On garde: $mod"
            fi
          done

          find addons -type f -path "*/i18n/*.po" \
            ! -name "en*.po" \
            ! -name "fr*.po" \
            ! -name "nl*.po" \
            -delete

          single_files_to_delete=(
            ".github/PULL_REQUEST_TEMPLATE.md"
            ".github/ISSUE_TEMPLATE/1_bug_form.yml"
            ".github/ISSUE_TEMPLATE/config.yml"
          )

          for f in "${single_files_to_delete[@]}"; do
            if [ -f "$f" ]; then
              echo "🗑️  Suppression fichier: $f"
              rm -f "$f"
            else
              echo "ℹ️  Fichier absent (ok): $f"
            fi
          done

          # 🔍 Suppression des fichiers liés aux modules et nettoyage des manifests

          module_files_to_delete=(
            "odoo/addons/base/data/ir_module_module.xml"
          )

          for f in "${module_files_to_delete[@]}"; do
            if [ -f "$f" ]; then
              echo "🗑️  Suppression fichier de module: $f"

              manifest=$(find_manifest "$(dirname "$f")")
              if [ -n "$manifest" ]; then
                echo "📝 Manifest trouvé: $manifest"
                echo "🔎 Ligne(s) contenant $f avant suppression:"
                grep "$f" "$manifest" || echo "   (aucune ligne trouvée)"
                
                # Suppression de la ligne
                sed -i "\|$f|d" "$manifest"

                echo "✅ Vérification après suppression:"
                grep "$f" "$manifest" || echo "   (aucune occurrence restante)"
              else
                echo "⚠️  Aucun manifest trouvé pour $f"
              fi

              rm -f "$f"
            else
              echo "ℹ️  Fichier absent (ok): $f"
            fi
          done

          find . -type f -name "*.bat" -delete
          find . -type d -iname "*win32*" -exec rm -rf {} +

          echo "✅ Nettoyage terminé"

      - name: 🚑 Patch Odoo with fake iap module
        run: |
          IAP_DIR="odoo/addons/iap"
          mkdir -p "$IAP_DIR/tools"

          # Manifest minimal
          cat > "$IAP_DIR/__manifest__.py" << 'EOF'
          {
              'name': 'iap (fake)',
              'version': '1.0',
              'summary': 'Fake IAP module to bypass dependencies',
              'category': 'Hidden',
              'author': 'Custom Patch',
              'depends': ['base'],
              'installable': True,
              'application': False,
          }
          EOF

          # Init vide
          echo "" > "$IAP_DIR/__init__.py"

          # Tools factices
          cat > "$IAP_DIR/tools/iap_tools.py" << 'EOF'
          def iap_jsonrpc(endpoint, params=None, timeout=30):
              # Fake response for patched environment
              return {"status": "success", "content": "Fake IAP response"}
          EOF

          echo "✅ Fake iap module created at $IAP_DIR"

      - name: Commit cleaned version
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add -A
          git commit -m "🔄 Build cleaned framework from 18.0" || echo "No changes to commit"
          git push origin 18.0-cleaned --force

      - name: List remaining addons
        run: ls -d addons/* || true
